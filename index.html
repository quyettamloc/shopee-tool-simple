<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rút Link Shopee</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:90%;
    max-width:500px;
    background:#1f2937;
    padding:25px;
    border-radius:16px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff5b2e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#111827;
    padding:15px;
    border-radius:10px;
    word-break:break-all;
}
</style>
</head>

<body>

<div class="box">

<h1>Nhập Link Shopee</h1>

<input id="linkInput" placeholder="Dán link Shopee vào đây">

<button onclick="convertLink()">
Chuyển đổi link
</button>

<div class="result" id="result">
Affiliate link sẽ hiện ở đây...
</div>

</div>

<script>

function convertLink(){

    let link = document.getElementById("linkInput").value;

    if(link === ""){
        alert("Vui lòng nhập link");
        return;
    }

    let affiliateLink = link + "?sub_id=quyettamloc";

    document.getElementById("result").innerHTML = `
        ${affiliateLink}
        <br><br>
        <button onclick="copyLink('${affiliateLink}')">
        Copy Link
        </button>
    `;
}

function copyLink(text){
    navigator.clipboard.writeText(text);
    alert("Đã copy link");
}

</script>

</body>s
</html>
